<!DOCTYPE html>
<html>
<head>
    <title>Health Prediction App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <h2 class="mb-4 text-center">Health Prediction System</h2>

    <div class="text-end mb-3">
        <a href="/add" class="btn btn-primary">Add Patient</a>
    </div>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">
            <tr>
                <th>Full Name</th>
                <th>Email</th>
                <th>Glucose</th>
                <th>Haemoglobin</th>
                <th>Cholesterol</th>
                <th>Remarks</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>

    {% for patient in patients %}

    <tr>

        <td>{{ patient[1] }}</td>
        <td>{{ patient[3] }}</td>
        <td>{{ patient[4] }}</td>
        <td>{{ patient[5] }}</td>
        <td>{{ patient[6] }}</td>
        <td>{{ patient[7] }}</td>
    <td>
    <a href="/edit/{{ patient[0] }}" class="btn btn-warning btn-sm">
        Edit
    </a>

    <a href="/delete/{{ patient[0] }}" class="btn btn-danger btn-sm">
        Delete
    </a>
    </td>

    </tr>

    {% endfor %}

</tbody>

    </table>

</body>
</html>
