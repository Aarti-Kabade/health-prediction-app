<!DOCTYPE html>
<html>
<head>
<title>Health Prediction App</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

<h2 class="text-center mb-4">
Health Prediction Application
</h2>

<form action="/add" method="POST">

<input class="form-control mb-2" name="full_name" placeholder="Full Name" required>

<input class="form-control mb-2" type="date" name="dob" required>

<input class="form-control mb-2" type="email" name="email" placeholder="Email" required>

<input class="form-control mb-2" type="number" step="0.01" name="glucose" placeholder="Glucose" required>

<input class="form-control mb-2" type="number" step="0.01" name="haemoglobin" placeholder="Haemoglobin" required>

<input class="form-control mb-2" type="number" step="0.01" name="cholesterol" placeholder="Cholesterol" required>

<button class="btn btn-primary">
Predict & Save
</button>

</form>

<hr>

<table class="table table-bordered">

<tr>
<th>ID</th>
<th>Name</th>
<th>DOB</th>
<th>Email</th>
<th>Glucose</th>
<th>Haemoglobin</th>
<th>Cholesterol</th>
<th>Remarks</th>
<th>Actions</th>
</tr>

{% for p in patients %}

<tr>

<td>{{ p[0] }}</td>
<td>{{ p[1] }}</td>
<td>{{ p[2] }}</td>
<td>{{ p[3] }}</td>
<td>{{ p[4] }}</td>
<td>{{ p[5] }}</td>
<td>{{ p[6] }}</td>
<td>{{ p[7] }}</td>

<td>

<a class="btn btn-warning btn-sm"
href="/edit/{{ p[0] }}">
Edit
</a>

<a class="btn btn-danger btn-sm"
href="/delete/{{ p[0] }}">
Delete
</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
