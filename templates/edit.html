<!DOCTYPE html>
<html>
<head>

<title>Edit Patient</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Edit Patient</h2>

<form action="/update/{{ patient[0] }}" method="POST">

<input class="form-control mb-2"
name="full_name"
value="{{ patient[1] }}"
required>

<input class="form-control mb-2"
name="email"
value="{{ patient[3] }}"
required>

<input class="form-control mb-2"
type="number"
step="0.01"
name="glucose"
value="{{ patient[4] }}"
required>

<input class="form-control mb-2"
type="number"
step="0.01"
name="haemoglobin"
value="{{ patient[5] }}"
required>

<input class="form-control mb-2"
type="number"
step="0.01"
name="cholesterol"
value="{{ patient[6] }}"
required>

<button class="btn btn-success">
Update
</button>

<a href="/" class="btn btn-secondary">
Back
</a>

</form>

</div>

</body>
</html>
