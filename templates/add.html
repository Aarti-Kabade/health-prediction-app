<!DOCTYPE html>
<html>
<head>
    <title>Add Patient</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <h2 class="mb-4 text-center">Add Patient</h2>

    <form method="POST">

        <div class="mb-3">
            <label>Full Name</label>
            <input type="text" name="fullname" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Date of Birth</label>
            <input type="date" name="dob" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" name="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Glucose</label>
            <input type="number" step="0.1" name="glucose" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Haemoglobin</label>
            <input type="number" step="0.1" name="haemoglobin" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Cholesterol</label>
            <input type="number" step="0.1" name="cholesterol" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-success">
            Save Patient
        </button>

        <a href="/" class="btn btn-secondary">
            Back
        </a>

    </form>

</body>
</html>
